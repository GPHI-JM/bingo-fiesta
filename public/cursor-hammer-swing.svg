<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="50%" style="stop-color:#ffb300"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <linearGradient id="handle2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8d6e63"/>
      <stop offset="100%" style="stop-color:#5d4037"/>
    </linearGradient>
  </defs>
  <!-- Handle (angled down for strike) -->
  <rect x="14" y="6" width="4" height="18" rx="1" transform="rotate(45 16 16)" fill="url(#handle2)"/>
  <!-- Hammer head (down, impact position) -->
  <rect x="6" y="18" width="16" height="10" rx="2" fill="url(#gold2)" stroke="#ff8f00" stroke-width="1"/>
</svg>
