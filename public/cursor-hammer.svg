<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd54f"/>
      <stop offset="50%" style="stop-color:#ffb300"/>
      <stop offset="100%" style="stop-color:#ff8f00"/>
    </linearGradient>
    <linearGradient id="handle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8d6e63"/>
      <stop offset="100%" style="stop-color:#5d4037"/>
    </linearGradient>
  </defs>
  <!-- Handle (angled up-right) -->
  <rect x="14" y="8" width="4" height="18" rx="1" transform="rotate(-35 16 16)" fill="url(#handle)"/>
  <!-- Hammer head (blocky, raised) -->
  <rect x="4" y="2" width="16" height="10" rx="2" fill="url(#gold)" stroke="#ff8f00" stroke-width="1"/>
</svg>
